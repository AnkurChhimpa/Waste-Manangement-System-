<!-- Success Modal -->
<div id="successModal" class="modal">
    <div class="modal-content">
        <span class="close">&times;</span>
        <div class="modal-icon">✅</div>
        <h3>Report Submitted!</h3>
        <p>Thank you for helping make our community cleaner. Your report has been submitted successfully.</p>
        <button class="btn btn-primary" onclick="closeModal()">Continue</button>
    </div>
</div>

<!-- Login Modal -->
<div id="loginModal" class="modal">
    <div class="modal-content auth-modal">
        <span class="close" onclick="closeAuthModal()">&times;</span>
        <div class="auth-header">
            <h3>🔑 Login</h3>
            <p>Welcome back to Trashify</p>
        </div>
        <form class="auth-form" onsubmit="handleLogin(event)">
            <div class="form-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Login</button>
            <p class="auth-switch">Don't have an account? <a href="#" onclick="switchToRegister()">Register</a></p>
        </form>
    </div>
</div>

<!-- Register Modal -->
<div id="registerModal" class="modal">
    <div class="modal-content auth-modal">
        <span class="close" onclick="closeAuthModal()">&times;</span>
        <div class="auth-header">
            <h3>🌱 Register</h3>
            <p>Join the environmental movement</p>
        </div>
        <form class="auth-form" onsubmit="handleRegister(event)">
            <div class="form-group">
                <input type="text" placeholder="Full Name" required>
            </div>
            <div class="form-group">
                <input type="email" placeholder="Email" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Password" required>
            </div>
            <div class="form-group">
                <input type="password" placeholder="Confirm Password" required>
            </div>
            <button type="submit" class="btn btn-primary btn-full">Register</button>
            <p class="auth-switch">Already have an account? <a href="#" onclick="switchToLogin()">Login</a></p>
        </form>
    </div>
</div>
