<!-- Notifications Dropdown -->
<div id="notificationsDropdown" class="notifications-dropdown">
    <div class="notifications-header">
        <h4>Notifications</h4>
        <button class="mark-all-read" onclick="markAllRead()">Mark all read</button>
    </div>
    <div class="notifications-list">
        <div class="notification-item unread">
            <div class="notification-icon">✅</div>
            <div class="notification-content">
                <p>Your waste report #WR001 has been resolved!</p>
                <span class="notification-time">2 hours ago</span>
            </div>
        </div>
        <div class="notification-item unread">
            <div class="notification-icon">🏆</div>
            <div class="notification-content">
                <p>You've earned 10 points for your contribution!</p>
                <span class="notification-time">4 hours ago</span>
            </div>
        </div>
        <div class="notification-item">
            <div class="notification-icon">📊</div>
            <div class="notification-content">
                <p>Weekly report: 5 new reports in your area</p>
                <span class="notification-time">1 day ago</span>
            </div>
        </div>
    </div>
</div>
